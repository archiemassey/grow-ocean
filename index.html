<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a2e44" />
  <meta name="description" content="gROW Ocean — offline companion for the Atlantic row." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>gROW Ocean</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="backBtn" class="iconbtn" hidden aria-label="Back">‹</button>
      <h1 id="topTitle">gROW&nbsp;Ocean</h1>
      <span id="netStatus" class="net" title="Connection status">offline-ready</span>
    </header>

    <main id="view" class="view" tabindex="-1"><!-- views render here --></main>

    <nav class="tabbar" id="tabbar" aria-label="Primary">
      <a href="#/home" class="tab" data-tab="home"><span class="ico">⌂</span><span>Home</span></a>
      <a href="#/wiki" class="tab" data-tab="wiki"><span class="ico">📖</span><span>Wiki</span></a>
      <a href="#/reminders" class="tab" data-tab="reminders"><span class="ico">⏰</span><span>Reminders</span></a>
      <a href="#/checklists" class="tab" data-tab="checklists"><span class="ico">✓</span><span>Checks</span></a>
      <a href="#/log" class="tab" data-tab="log"><span class="ico">🎙</span><span>Log</span></a>
      <a href="#/entertain" class="tab" data-tab="entertain"><span class="ico">★</span><span>Morale</span></a>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
